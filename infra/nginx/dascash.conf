# DasCash — nginx producción (dascash.com.ar)
# Sirve la SPA y proxya /api y /admin al backend Django (servicio "api").
#
# HTTPS: la terminación TLS depende del hosting elegido.
#  - Si el hosting da TLS (Railway, Render, Fly.io, Cloudflare): no tocar nada.
#  - Si es un VPS propio: agregar certbot (certbot --nginx -d dascash.com.ar -d www.dascash.com.ar)
#    y luego setear SECURE_SSL_REDIRECT=1 y SECURE_HSTS_SECONDS=2592000 en el .env del api.

server {
    listen 80;
    server_name dascash.com.ar www.dascash.com.ar localhost;

    client_max_body_size 10M;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta desconocida cae en index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets de Vite con hash en el nombre: cache agresivo
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API Django
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django admin
    location /admin/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Estáticos de Django (collectstatic → volumen compartido)
    location /static/ {
        alias /staticfiles/;
        expires 7d;
        add_header Cache-Control "public";
    }
}
